<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TYPEHAUS Preview</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f6f4ef;
    color:#1b1b1b;
  }
  .wrap{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:32px;
  }
  .card{
    width:min(960px,100%);
    background:#fff;
    border:1px solid #ddd7cd;
    border-radius:24px;
    padding:28px;
    box-shadow:0 18px 50px rgba(0,0,0,.08);
  }
  h1{
    margin:0 0 10px;
    font-size:clamp(28px,5vw,52px);
    line-height:1;
    letter-spacing:-.05em;
  }
  p{
    margin:0 0 18px;
    color:#5f5a52;
    line-height:1.5;
  }
  .links{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:18px;
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:0 16px;
    border-radius:999px;
    text-decoration:none;
    font-weight:600;
  }
  .primary{
    background:#111;
    color:#fff;
  }
  .secondary{
    border:1px solid #cfc8bc;
    color:#111;
    background:#fff;
  }
  iframe{
    width:100%;
    height:min(78vh,980px);
    border:1px solid #e5dfd4;
    border-radius:18px;
    background:#fff;
    margin-top:22px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TYPEHAUS Preview</h1>
      <p>ไฟล์นี้ใช้แสดงผลเว็บในโปรเจกต์นี้จาก `index.html` แบบดูได้ทันทีในเบราว์เซอร์</p>
      <div class="links">
        <a class="primary" href="./index.html">เปิดหน้าเว็บเต็ม</a>
        <a class="secondary" href="https://cetrinkhakuna3-prog.github.io/typehaus/">เปิด GitHub Pages</a>
      </div>
      <iframe src="./index.html" title="TYPEHAUS preview"></iframe>
    </div>
  </div>
</body>
</html>
